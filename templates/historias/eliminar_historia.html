<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Historia Clínica</title>
</head>
<body>
    <h2>¿Estás seguro de que quieres eliminar la historia clínica de {{ historia.paciente.username }}?</h2>
    <form method="POST">
        {% csrf_token %}
        <button type="submit">Eliminar</button>
        <a href="{% url 'detalle_historia_clinica' historia.id %}">Cancelar</a>
    </form>
</body>
</html>
